name: '🚀 Publish Release'

on:
  push:
    branches:
      - release
      
  workflow_dispatch:

# This workflow will trigger on each push to the `release` branch to create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: 🟩 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: 🐧 Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.

      - name: ⚡ Setup pnpm
        uses: pnpm/action-setup@v3.0.0
        with:
          version: latest

      - name: 📦 Install frontend dependencies
        run: pnpm install # change this to npm, pnpm or bun depending on which one you use.

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'Splicerr v__VERSION__ — API fix + Transpose'
          releaseBody: |
            ## Splicerr v1.0.10 — community fork

            Temporary fork of [Robert-K/splicerr](https://github.com/Robert-K/splicerr)
            that restores functionality and adds a bonus feature.

            ### 🔧 Fixes
            - **403 / "Something went wrong" fixed for good.** Splice's Cloudflare
              protection escalated to a managed challenge (`cf-mitigated: challenge`,
              "Just a moment…") that blocks *every* native HTTP client — the previous
              reqwest-based workaround, curl, and plain `fetch` all get a 403 now,
              regardless of headers. The GraphQL request is therefore routed through
              a hidden webview parked on the Splice origin, so it originates from a
              real browser engine (WebView2 on Windows, WebKit on macOS/Linux) and is
              no longer challenged. This is not another fingerprint trick — it stops
              the cat-and-mouse because the request genuinely is a browser.
              Apollo preflight headers (`apollo-require-preflight`,
              `x-apollo-operation-name`) are still sent.
              (upstream issue [#30](https://github.com/Robert-K/splicerr/issues/30))

            ### ✨ New
            - **Transpose** — shift samples by key or by semitones, tempo-preserving,
              applied to both preview playback and exported WAV.

            ### 📦 Downloads
            - **Windows** — `.exe` (installer) or `.msi`
            - **macOS** — `.dmg` (Apple Silicon & Intel)
            - **Linux** — `.AppImage`, `.deb`, `.rpm`

            > Once the headers fix is merged upstream, please switch back to the original repo.
            > All credit to the original authors — please ⭐ the original
            > [splicedd](https://github.com/ascpixi/splicedd) and
            > [splicerr](https://github.com/Robert-K/splicerr).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
